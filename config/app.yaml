# Totoro AI — non-secret application config
# Secrets (API keys, DB/Redis URLs) live in .env (gitignored symlink)
# ADR-015: YAML config loader for non-secret settings
# ADR-016: logical-role-to-provider mapping
# ADR-029: consolidated non-secret config into app.yaml

# ---------------------------------------------------------------------------
# App metadata
# ---------------------------------------------------------------------------
app:
  name: totoro-ai
  description: AI engine for Totoro
  api_prefix: /v1

# ---------------------------------------------------------------------------
# Model assignments — logical roles to providers and models
# ADR-016, ADR-020: code never hardcodes model names, always reads from config
# ---------------------------------------------------------------------------
providers:
  groq:
    base_url: https://api.groq.com
  ollama:
    base_url: http://localhost:11434/v1

models:
  transcriber:
    provider: groq
    model: whisper-large-v3-turbo
    max_tokens: 0
    temperature: 0

  vision_frames:
    provider: openai
    model: gpt-4o-mini
    max_tokens: 512
    temperature: 0

  intent_parser:
    provider: openai
    model: gpt-4o-mini
    max_tokens: 512
    temperature: 0
  # Offline swap: set provider: ollama, model: gemma4:e2b (requires: ollama serve)

  embedder:
    provider: voyage
    model: voyage-4-lite
    dimensions: 1024

  orchestrator:
    provider: anthropic
    model: claude-sonnet-4-6
    max_tokens: 1024
    temperature: 0.7

  evaluator:
    provider: openai
    model: gpt-4o-mini
    max_tokens: 256
    temperature: 0
  # Offline swap: set provider: ollama, model: gemma4:e2b (requires: ollama serve)

  chat_assistant:
    provider: openai
    model: gpt-4o-mini
    max_tokens: 1024
    temperature: 0.9

  taste_regen:
    provider: openai
    model: gpt-4o-mini
    max_tokens: 512
    temperature: 0.3

  intent_router:
    provider: groq
    model: llama-3.1-8b-instant
    max_tokens: 256
    temperature: 0

# ---------------------------------------------------------------------------
# Extraction pipeline — confidence weights and decision thresholds
# ADR-018, ADR-034: confidence scoring and two-phase confirmation
# ---------------------------------------------------------------------------
extraction:
  confidence_weights:
    base_scores:
      CAPTION: 0.70
      PLAIN_TEXT: 0.70
      SPEECH: 0.60
      OCR: 0.55
    places_modifiers:
      EXACT: 0.20
      FUZZY: 0.15
      CATEGORY_ONLY: 0.10
      NONE_CAP: 0.30
    multi_source_bonus: 0.10
    max_score: 0.95
  thresholds:
    store_silently: 0.70
    require_confirmation: 0.30
  confidence:
    base_scores:
      emoji_regex: 0.95
      llm_ner: 0.80
      subtitle_check: 0.75
      whisper_audio: 0.65
      vision_frames: 0.55
    corroboration_bonus: 0.10
    max_score: 0.97
    # ADR-057: two-band save gate.
    #   confidence < save_threshold    → not written, surfaces as "failed".
    #   save_threshold ≤ c < confident → written with status "needs_review".
    #   confidence ≥ confident_threshold → written silently as "saved".
    save_threshold: 0.30
    confident_threshold: 0.70
  circuit_breaker_threshold: 5
  circuit_breaker_cooldown: 900
  vision:
    max_frames: 5
    scene_threshold: 0.3
    timeout_seconds: 10
  whisper:
    timeout_seconds: 8
    audio_format: opus
    audio_quality: 32k
  subtitle:
    output_dir: /tmp/subtitles
    format: vtt
  # Place fields that can be updated on re-submission (upsert semantics)
  mutable_fields:
    - place_name
    - address
    - cuisine
    - price_range
    - lat
    - lng
    - source_url
    - validated_at
    - confidence
    - source

# ---------------------------------------------------------------------------
# External services — URLs, timeouts, and request fields
# ---------------------------------------------------------------------------
external_services:
  google_places:
    base_url: https://maps.googleapis.com/maps/api/place/findplacefromtext/json
    nearbysearch_url: https://maps.googleapis.com/maps/api/place/nearbysearch/json
    timeout_seconds: 5.0
    default_region: "th"
    request_fields:
      - name
      - formatted_address
      - place_id
      - geometry
      - types
  tiktok_oembed:
    base_url: https://www.tiktok.com/oembed
    timeout_seconds: 3.0

# ---------------------------------------------------------------------------
# Recall service configuration — Hybrid search with RRF
# ADR-045: Reciprocal Rank Fusion of pgvector + FTS
# ---------------------------------------------------------------------------
recall:
  max_results: 10
  rrf_k: 60
  candidate_multiplier: 2
  min_rrf_score: 0.01
  max_cosine_distance: 0.65

# ---------------------------------------------------------------------------
# Consult service configuration — Phase 3: 6-step pipeline
# ADR-049: PlacesClient moved to core/places
# ---------------------------------------------------------------------------
consult:
  max_alternatives: 2
  placeholder_photo_url: "https://placehold.co/800x450.webp"
  response_timeout_seconds: 10
  default_radius_m: 1500
  nearby_radius_m: 500
  walking_radius_m: 1000
  total_cap: 3

# ---------------------------------------------------------------------------
# Embeddings configuration
# ADR-040: Voyage 4-lite chosen for 9.25% better retrieval quality
# ---------------------------------------------------------------------------
embeddings:
  dimensions: 1024
  description_separator: " | "
  description_fields:
    - place_name
    - subcategory
    - place_type
    - cuisine
    - ambiance
    - price_hint
    - tags
    - good_for
    - dietary
    - neighborhood
    - city
    - country

# ---------------------------------------------------------------------------
# Prompt Templates (ADR-059)
# Logical name → file path relative to config/prompts/
# Code loads via get_config().prompts["name"], cached on first read.
# Migrate hardcoded prompts here incrementally.
# ---------------------------------------------------------------------------
prompts:
  taste_regen: taste_regen.txt

# ---------------------------------------------------------------------------
# Taste Model Configuration
# Signal-counts aggregation + LLM-generated taste_profile_summary + chips
# ADR-058: RankingService deleted, agent-driven ranking deferred
# ---------------------------------------------------------------------------
taste_model:
  debounce_window_seconds: 30
  regen:
    min_signals: 3
    early_signal_threshold: 10
  chip_threshold: 2
  chip_max_count: 8
  chip_selection_stages:
    round_1: 5
    round_2: 20
    round_3: 50
  warming_blend:
    discovered: 0.8
    saved: 0.2

# ---------------------------------------------------------------------------
# User Memory Configuration
# Personal fact extraction confidence thresholds
# ---------------------------------------------------------------------------
memory:
  confidence:
    stated: 0.9
    inferred: 0.6

# ---------------------------------------------------------------------------
# PlacesService Configuration (ADR-054, feature 019)
# Single TTL for both the geo cache (Tier 2) and the enrichment cache
# (Tier 3), plus the per-request cap on external provider fetches in
# enrich_batch(geo_only=False).
# ---------------------------------------------------------------------------
places:
  cache_ttl_days: 30
  # Per-consult fetch cap. Raised from 10 to 20 after the initial cap hit
  # on real Bangkok queries (1 saved + 19 discovered). Combined with the
  # saved-pid priority in `_fetch_and_split_misses`, saved places are
  # guaranteed to be fetched and discovered places get the remaining
  # budget up to this cap. Each fetch is a single Places API (New) Pro-
  # tier call, cached for `cache_ttl_days`, so the amortized cost is
  # dominated by the first consult for each place_id.
  max_enrichment_batch: 20
