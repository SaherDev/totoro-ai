# Totoro AI — non-secret application config
# Secrets (API keys, DB/Redis URLs) live in config/.local.yaml (gitignored)
# ADR-015: YAML config loader for non-secret settings
# ADR-016: logical-role-to-provider mapping
# ADR-029: consolidated non-secret config into app.yaml

# ---------------------------------------------------------------------------
# App metadata
# ---------------------------------------------------------------------------
app:
  name: totoro-ai
  description: AI engine for Totoro
  api_prefix: /v1

# ---------------------------------------------------------------------------
# Model assignments — logical roles to providers and models
# ADR-016, ADR-020: code never hardcodes model names, always reads from config
# ---------------------------------------------------------------------------
models:
  intent_parser:
    provider: openai
    model: gpt-4o-mini
    max_tokens: 512
    temperature: 0

  embedder:
    provider: voyage
    model: voyage-3.5-lite

  orchestrator:
    provider: anthropic
    model: claude-sonnet-4-6-20250514
    max_tokens: 1024
    temperature: 0.7

  evaluator:
    provider: openai
    model: gpt-4o-mini
    max_tokens: 256
    temperature: 0

# ---------------------------------------------------------------------------
# Extraction pipeline — confidence weights and decision thresholds
# ADR-018, ADR-034: confidence scoring and two-phase confirmation
# ---------------------------------------------------------------------------
extraction:
  confidence_weights:
    base_scores:
      CAPTION: 0.70
      PLAIN_TEXT: 0.70
      SPEECH: 0.60
      OCR: 0.55
    places_modifiers:
      EXACT: 0.20
      FUZZY: 0.15
      CATEGORY_ONLY: 0.10
      NONE_CAP: 0.30
    multi_source_bonus: 0.10
    max_score: 0.95
  thresholds:
    store_silently: 0.70
    require_confirmation: 0.30
