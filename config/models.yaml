# Model configuration mapping logical roles to providers and models
# ADR-020: Provider abstraction - code never hardcodes model names

intent_parser:
  provider: openai
  model: gpt-4o-mini
  max_tokens: 512
  temperature: 0

embedder:
  provider: voyage
  model: voyage-3.5-lite

orchestrator:
  provider: anthropic
  model: claude-sonnet-4-6-20250514
  max_tokens: 1024
  temperature: 0.7

evaluator:
  provider: openai
  model: gpt-4o-mini
  max_tokens: 256
  temperature: 0
